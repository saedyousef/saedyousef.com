name: Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GitHub activity dataset
        env:
          GH_CONTRIBUTION_TOKEN: ${{ secrets.GH_CONTRIBUTION_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_LOGIN: saedyousef
        run: node scripts/fetch-github-activity.mjs

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build site
        run: npm run build

      - name: Verify custom domain artifact
        run: |
          node -e "const fs = require('fs'); const value = fs.readFileSync('dist/CNAME', 'utf8').trim(); if (value !== 'saedyousef.com') { throw new Error('Invalid CNAME: ' + value); }"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          cname: saedyousef.com
          exclude_assets: ''
